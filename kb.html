<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base | SDGNext</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }

        /* ── Sidebar nav item ── */
        .cat-nav-item { transition: all 0.15s ease; }
        .cat-nav-item.active {
            background: #f0f4ff;
            color: #4f46e5;
            font-weight: 700;
        }
        .cat-nav-item:not(.active):hover { background: #f8fafc; }

        /* ── Article card ── */
        .article-card {
            transition: box-shadow 0.15s, transform 0.15s;
            cursor: pointer;
        }
        .article-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transform: translateY(-1px);
        }

        /* ── Prose rendering for article body ── */
        .kb-prose h2 {
            font-size: 1.2rem; font-weight: 800; color: #1a233a;
            margin: 1.6rem 0 0.7rem; padding-bottom: 6px;
            border-bottom: 1.5px solid #e2e8f0;
        }
        .kb-prose h3 {
            font-size: 0.95rem; font-weight: 700; color: #1a233a;
            margin: 1.3rem 0 0.5rem;
        }
        .kb-prose p  { font-size: 0.875rem; color: #374151; line-height: 1.75; margin-bottom: 0.85rem; }
        .kb-prose ul, .kb-prose ol { padding-left: 1.5rem; margin-bottom: 0.85rem; }
        .kb-prose li { font-size: 0.875rem; color: #374151; line-height: 1.75; margin-bottom: 0.25rem; }
        .kb-prose ul li { list-style: disc; }
        .kb-prose ol li { list-style: decimal; }
        .kb-prose strong { font-weight: 700; color: #1a233a; }
        .kb-prose em    { font-style: italic; color: #4b5563; }
        .kb-prose code  {
            font-family: 'Fira Mono', monospace;
            font-size: 0.78rem; background: #f1f5f9;
            color: #7c3aed; padding: 1px 5px; border-radius: 4px;
        }
        .kb-prose hr { border: none; border-top: 1.5px solid #e2e8f0; margin: 1.5rem 0; }

        /* ── Rich text editor toolbar ── */
        .rte-btn {
            padding: 4px 8px; border-radius: 5px; font-size: 12px;
            font-weight: 600; color: #475569; cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.15s;
        }
        .rte-btn:hover { background: #f1f5f9; border-color: #e2e8f0; }
        .rte-btn.active { background: #e0e7ff; color: #4f46e5; border-color: #c7d2fe; }

        /* ── Editor area ── */
        #rte-editor {
            min-height: 200px;
            outline: none;
            font-size: 14px;
            line-height: 1.75;
            color: #1e293b;
        }
        #rte-editor:empty:before {
            content: attr(data-placeholder);
            color: #94a3b8;
        }
        #rte-editor h2 { font-size: 1.15rem; font-weight: 800; margin: 1rem 0 0.4rem; }
        #rte-editor h3 { font-size: 1rem;    font-weight: 700; margin: 0.8rem 0 0.3rem; }
        #rte-editor ul, #rte-editor ol { padding-left: 1.4rem; margin: 0.4rem 0; }
        #rte-editor li { margin-bottom: 0.2rem; }

        /* ── Tag pills ── */
        .tag-pill {
            display: inline-flex; align-items: center; gap: 4px;
            background: #f1f5f9; color: #475569;
            font-size: 10px; font-weight: 600; padding: 3px 8px;
            border-radius: 9999px; border: 1px solid #e2e8f0;
        }

        /* ── Color map ── */
        .cat-blue   { background: #eff6ff; color: #2563eb; }
        .cat-indigo { background: #eef2ff; color: #4f46e5; }
        .cat-teal   { background: #f0fdfa; color: #0d9488; }
        .cat-amber  { background: #fffbeb; color: #d97706; }
        .cat-pink   { background: #fdf2f8; color: #db2777; }

        /* ── Skeleton ── */
        .skeleton { background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ── Slide-in animation ── */
        @keyframes slide-in { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:translateX(0)} }
        .slide-in { animation: slide-in 0.25s ease forwards; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 9999px; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex flex-col">

    <!-- ── Header ─────────────────────────────────────────────────── -->
    <header class="bg-shell text-white flex-shrink-0">
        <div class="max-w-[1400px] mx-auto px-6 py-3.5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="hover:opacity-80 transition-opacity">
                    <span class="text-base font-black tracking-tight">SDG<span class="text-pink-400">NEXT</span></span>
                </a>
                <span class="text-slate-600">|</span>
                <nav class="flex items-center gap-1 text-xs text-slate-400">
                    <a href="/" class="hover:text-white transition-colors">Home</a>
                    <span class="mx-1">/</span>
                    <span class="text-white font-semibold">Knowledge Base</span>
                </nav>
            </div>
            <div id="user-badge-anchor"></div>
        </div>
    </header>

    <!-- ── Body ───────────────────────────────────────────────────── -->
    <div class="flex flex-1 overflow-hidden max-w-[1400px] mx-auto w-full px-6 py-6 gap-6">

        <!-- ── LEFT SIDEBAR ─────────────────────────────────────────── -->
        <aside class="w-56 flex-shrink-0 flex flex-col gap-2">

            <!-- Search -->
            <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
                <input id="kb-search" type="text" placeholder="Search articles…"
                    class="w-full pl-8 pr-3 py-2 text-xs border border-slate-200 rounded-lg bg-white focus:outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-100"
                    oninput="handleSearch(this.value)">
            </div>

            <!-- Nav -->
            <div class="bg-white rounded-xl border border-slate-200 overflow-hidden flex-1">
                <div class="px-4 py-3 border-b border-slate-100">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Categories</p>
                </div>
                <nav id="kb-cat-nav" class="p-2 space-y-0.5">
                    <!-- populated by JS -->
                </nav>

                <!-- Admin: New Article -->
                <div id="kb-admin-actions" class="hidden p-3 border-t border-slate-100">
                    <button onclick="openArticleModal()" class="w-full text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 px-3 py-2 rounded-lg flex items-center justify-center gap-1.5 transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        New Article
                    </button>
                </div>
            </div>
        </aside>

        <!-- ── MAIN CONTENT ────────────────────────────────────────── -->
        <main class="flex-1 min-w-0 overflow-y-auto">

            <!-- LIST VIEW (default) -->
            <div id="kb-list-view">
                <!-- Header row -->
                <div class="flex items-center justify-between mb-5">
                    <div>
                        <h2 id="kb-list-title" class="text-lg font-black text-[#1a233a]">All Articles</h2>
                        <p id="kb-list-subtitle" class="text-xs text-slate-400 mt-0.5"></p>
                    </div>
                    <button id="kb-header-new-btn" onclick="openArticleModal()" class="hidden text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg flex items-center gap-1.5 transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        New Article
                    </button>
                </div>

                <!-- Pinned section -->
                <div id="kb-pinned-section" class="hidden mb-6">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-1.5">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M16 1v6l2 3v3H6V10l2-3V1h8zm-5 20a2 2 0 0 0 4 0H11z"/></svg>
                        Pinned
                    </p>
                    <div id="kb-pinned-list" class="space-y-3"></div>
                </div>

                <!-- All articles grid -->
                <div id="kb-articles-section">
                    <div id="kb-articles-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-4"></div>
                </div>

                <!-- Empty / no results -->
                <div id="kb-empty" class="hidden text-center py-20">
                    <div class="w-14 h-14 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg class="w-7 h-7 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    </div>
                    <p class="text-sm font-semibold text-slate-400">No articles found</p>
                    <p id="kb-empty-sub" class="text-xs text-slate-300 mt-1">Try a different search or category</p>
                </div>
            </div>

            <!-- ARTICLE READER VIEW -->
            <div id="kb-reader-view" class="hidden slide-in">
                <!-- Back -->
                <button onclick="closeReader()" class="flex items-center gap-1.5 text-xs font-semibold text-slate-500 hover:text-[#1a233a] mb-5 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                    Back to Knowledge Base
                </button>

                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8 max-w-3xl">
                    <!-- Category badge + pin -->
                    <div class="flex items-center gap-2 mb-4" id="reader-meta-top"></div>
                    <!-- Title -->
                    <h1 id="reader-title" class="text-2xl font-black text-[#1a233a] leading-tight mb-2"></h1>
                    <!-- Subtitle meta -->
                    <div class="flex items-center gap-3 text-xs text-slate-400 mb-1" id="reader-meta-bottom"></div>
                    <!-- Tags -->
                    <div id="reader-tags" class="flex flex-wrap gap-1.5 mb-6 mt-3"></div>
                    <!-- Divider -->
                    <hr class="border-slate-100 mb-6">
                    <!-- Body -->
                    <div id="reader-body" class="kb-prose"></div>
                    <!-- Admin actions -->
                    <div id="reader-admin-actions" class="hidden mt-8 pt-5 border-t border-slate-100 flex items-center gap-2">
                        <button id="reader-edit-btn" onclick="editCurrentArticle()" class="text-xs font-bold text-indigo-600 border border-indigo-200 bg-indigo-50 hover:bg-indigo-100 px-4 py-2 rounded-lg transition-colors">Edit</button>
                        <button id="reader-publish-btn" onclick="togglePublishCurrentArticle()" class="text-xs font-bold px-4 py-2 rounded-lg transition-colors border"></button>
                        <button id="reader-delete-btn" onclick="deleteCurrentArticle()" class="text-xs font-bold text-red-500 border border-red-100 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg transition-colors ml-auto">Delete</button>
                    </div>
                </div>
            </div>

        </main>
    </div>


    <!-- ════════════════════════════════════════════════════════
         CREATE / EDIT ARTICLE MODAL
    ════════════════════════════════════════════════════════ -->
    <div id="kb-article-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[92vh] flex flex-col">
            <!-- Header -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
                <h3 id="modal-title" class="text-sm font-bold text-[#1a233a]">New Article</h3>
                <button onclick="closeArticleModal()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <!-- Body (scrollable) -->
            <div class="overflow-y-auto flex-1 px-6 py-5 space-y-4">

                <!-- Category + Title row -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Category *</label>
                        <select id="modal-category" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-400">
                            <option value="">Select category…</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Title *</label>
                        <input id="modal-article-title" type="text" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-400" placeholder="Article title…">
                    </div>
                </div>

                <!-- Summary -->
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Summary</label>
                    <textarea id="modal-summary" rows="2" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-400 resize-none" placeholder="One-liner shown in the article card…"></textarea>
                </div>

                <!-- Rich Text Editor -->
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Body *</label>
                    <!-- Toolbar -->
                    <div class="flex flex-wrap items-center gap-1 px-3 py-2 border border-slate-200 border-b-0 rounded-t-lg bg-slate-50">
                        <button class="rte-btn" onclick="rte('bold')" title="Bold"><b>B</b></button>
                        <button class="rte-btn" onclick="rte('italic')" title="Italic"><i>I</i></button>
                        <div class="w-px h-4 bg-slate-200 mx-1"></div>
                        <button class="rte-btn" onclick="rteHeading('h2')" title="Heading 2">H2</button>
                        <button class="rte-btn" onclick="rteHeading('h3')" title="Heading 3">H3</button>
                        <div class="w-px h-4 bg-slate-200 mx-1"></div>
                        <button class="rte-btn" onclick="rte('insertUnorderedList')" title="Bullet list">• List</button>
                        <button class="rte-btn" onclick="rte('insertOrderedList')"   title="Numbered list">1. List</button>
                        <div class="w-px h-4 bg-slate-200 mx-1"></div>
                        <button class="rte-btn font-mono" onclick="rteCode()" title="Inline code">&lt;/&gt;</button>
                        <button class="rte-btn" onclick="rte('insertHorizontalRule')" title="Divider">—</button>
                    </div>
                    <!-- Editable area -->
                    <div id="rte-editor" contenteditable="true"
                        data-placeholder="Write your article body here… (supports bold, headings, lists)"
                        class="border border-slate-200 rounded-b-lg px-4 py-3 min-h-[200px] focus:outline-none focus:border-indigo-400 overflow-y-auto max-h-[260px]">
                    </div>
                </div>

                <!-- Tags -->
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Tags</label>
                    <div id="tag-container" class="flex flex-wrap gap-1.5 items-center min-h-[36px] w-full border border-slate-200 rounded-lg px-3 py-2 focus-within:border-indigo-400 cursor-text" onclick="document.getElementById('tag-input').focus()">
                        <!-- tag pills injected here -->
                        <input id="tag-input" type="text" class="outline-none text-xs text-slate-600 flex-1 min-w-[80px] bg-transparent" placeholder="Type and press Enter…" onkeydown="handleTagInput(event)">
                    </div>
                </div>

                <!-- Flags (admin only) -->
                <div id="modal-admin-flags" class="hidden flex items-center gap-6">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="modal-pinned" class="w-4 h-4 rounded text-indigo-600">
                        <span class="text-xs font-semibold text-slate-600">Pin this article</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="modal-published" checked class="w-4 h-4 rounded text-indigo-600">
                        <span class="text-xs font-semibold text-slate-600">Published</span>
                    </label>
                </div>

                <!-- Error -->
                <div id="modal-error" class="hidden text-xs text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></div>
            </div>

            <!-- Footer -->
            <div class="flex items-center justify-end gap-2 px-6 py-4 border-t border-slate-100">
                <button onclick="closeArticleModal()" class="text-xs font-bold text-slate-500 border border-slate-200 px-4 py-2 rounded-lg hover:bg-slate-50">Cancel</button>
                <button id="modal-save-btn" onclick="saveArticle()" class="text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 px-5 py-2 rounded-lg transition-colors">
                    <span id="modal-save-label">Save Article</span>
                </button>
            </div>
        </div>
    </div>


    <!-- ════════════════════════════════════════════════════════
         SCRIPTS
    ════════════════════════════════════════════════════════ -->
    <script src="/js/auth-guard.js"></script>
    <script src="/js/kb.js"></script>
</body>
</html>
