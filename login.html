<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDGNext | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f4f7f9] h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-[#1a233a]">SDG<span class="text-pink-500">NEXT</span></h1>
            <p class="text-sm text-slate-500 mt-2">Command Center Login</p>
        </div>
        <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-8">
            <div id="error-msg" class="hidden mb-4 bg-red-50 border border-red-200 text-red-600 text-sm font-medium px-4 py-3 rounded-lg"></div>
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" id="username" placeholder="Enter username" class="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="password" placeholder="Enter password" class="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500" onkeydown="if(event.key==='Enter') doLogin()">
                </div>
                <button onclick="doLogin()" id="login-btn" class="w-full bg-[#1a233a] hover:bg-slate-800 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all text-sm">Sign In</button>
            </div>
        </div>
        <p class="text-center text-xs text-slate-400 mt-6">Default admin: admin / admin123</p>
    </div>
    <script>
        async function doLogin() {
            const btn = document.getElementById('login-btn');
            const errDiv = document.getElementById('error-msg');
            errDiv.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');
                window.location.href = '/';
            } catch (e) {
                errDiv.textContent = e.message;
                errDiv.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }
    </script>
</body>

        async function doLogin() {

                });

                if (data.user.role === 'admin') {
                    window.location.href = '/';
                } else {
                    window.location.href = '/';
                }
            } catch (e) {
                errDiv.textContent = e.message;
