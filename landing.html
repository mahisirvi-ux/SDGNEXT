<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDGNext | Command Center</title>
        <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: var(--surface-page, #f8fafc); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Top Bar -->
        <header class="bg-shell text-white">
                <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                <a href="/" class="hover:opacity-80 transition-opacity" title="Home">
                    <h1 class="text-lg font-bold tracking-tight">SDG<span class="text-pink-400">NEXT</span></h1>
                </a>
                <span class="text-[10px] uppercase tracking-widest text-slate-400 hidden sm:inline">Command Center</span>
            </div>
            <!-- User badge injected here by auth-guard.js -->
            <div id="user-badge-anchor"></div>
        </div>
    </header>

                <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-12">

        <!-- Section Header -->
        <div class="flex items-end justify-between mb-10">
            <div>
                <h2 class="text-base font-semibold" style="color: var(--text-primary);">Project Overview</h2>
                <p class="text-xs mt-1" style="color: var(--text-secondary);">14-day trend across active projects. Click a card to expand.</p>
            </div>
            <button onclick="openNewProjectModal()" class="text-xs font-semibold px-4 py-2 rounded-lg shadow-sm transition-all" style="background: var(--shell); color: white;">
                + New Project
            </button>
        </div>

        <!-- Project Cards Grid -->
        <div id="project-cards-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Skeleton loaders (replaced once data arrives) -->
            <div class="bg-white rounded-xl border p-6" style="border-color: var(--border-default);">
                <div class="skeleton" style="height: 18px; width: 140px; margin-bottom: 20px;"></div>
                <div class="grid grid-cols-2 gap-4"><div class="skeleton" style="height: 48px;"></div><div class="skeleton" style="height: 48px;"></div><div class="skeleton" style="height: 48px;"></div><div class="skeleton" style="height: 48px;"></div></div>
            </div>
            <div class="bg-white rounded-xl border p-6" style="border-color: var(--border-default);">
                <div class="skeleton" style="height: 18px; width: 160px; margin-bottom: 20px;"></div>
                <div class="grid grid-cols-2 gap-4"><div class="skeleton" style="height: 48px;"></div><div class="skeleton" style="height: 48px;"></div><div class="skeleton" style="height: 48px;"></div><div class="skeleton" style="height: 48px;"></div></div>
            </div>
        </div>

        <!-- Drilldown panel (appears below grid on card expand) -->
        <div id="project-drilldown" class="hidden mt-6"></div>

        <!-- Empty state (no projects at all) -->
        <section id="empty-state" class="hidden">
            <div class="text-center py-20">
                <h3 class="text-base font-semibold" style="color: var(--text-primary);">Welcome to SDGNext</h3>
                <p class="text-sm mt-2" style="color: var(--text-secondary);">Get started by creating your first project.</p>
                <button onclick="openNewProjectModal()" class="mt-6 text-xs font-semibold px-5 py-2.5 rounded-lg shadow-sm" style="background: var(--shell); color: white;">
                    + New Project
                </button>
            </div>
        </section>
    </main>

    <!-- New Project Modal -->
    <div id="new-project-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
        <!-- Modal sizes: sm=400, md=520, lg=700. See ui-tokens.md. -->
        <div class="bg-white rounded-xl shadow-2xl w-[400px] p-6">
            <h3 class="text-sm font-bold text-[#1a233a] mb-4">Create New Project</h3>
            <input type="text" id="new-project-name" class="w-full text-sm p-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-200" placeholder="Project name" autofocus>
            <p id="new-project-error" class="text-xs text-red-500 mt-1 hidden"></p>
            <div class="flex justify-end gap-2 mt-4">
                <button onclick="closeNewProjectModal()" class="text-[11px] font-bold text-slate-500 px-4 py-2 rounded-lg border border-slate-200">Cancel</button>
                <button onclick="submitNewProject()" class="text-[11px] font-bold text-white bg-primary hover:bg-primary-hover px-4 py-2 rounded-lg shadow">Create</button>
            </div>
        </div>
    </div>

    <script src="/js/auth-guard.js"></script>
    <script src="/js/landing.js?v=3"></script>
</body>
</html>
